<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>專業計算器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #2a2a2a;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        }
        .calculator {
            background: #fff;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 20px;
            width: 320px;
            display: inline-block;
        }
        .title {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
            font-size: 24px;
            font-weight: 600;
        }
        .display {
            width: 100%;
            padding: 20px;
            font-size: 32px;
            text-align: right;
            border: none;
            background: #f5f5f5;
            border-radius: 10px;
            margin-bottom: 20px;
            color: #333;
            font-weight: 500;
            word-wrap: break-word;
            word-break: break-all;
        }
        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }
        button {
            padding: 20px;
            font-size: 18px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s ease;
            color: #fff;
        }
        .number {
            background: #e0e0e0;
            color: #333;
        }
        .number:active {
            background: #d0d0d0;
            transform: scale(0.95);
        }
        .operator {
            background: #667eea;
        }
        .operator:active {
            background: #5568d3;
            transform: scale(0.95);
        }
        .equal {
            background: #48bb78;
            grid-column: span 2;
        }
        .equal:active {
            background: #38a169;
            transform: scale(0.95);
        }
        .clear {
            background: #f56565;
            grid-column: span 2;
        }
        .clear:active {
            background: #e53e3e;
            transform: scale(0.95);
        }
        .version {
            margin-top: 10px;
            text-align: center;
            color: #fff;
            padding: 6px 12px;
            border-radius: 8px;
            min-width: 320px;
        }
    </style>
</head>
<body>


    <div style="display: block;">
    <div class="calculator">
        <div class="title">計算器</div>
        <input type="text" id="display" class="display" readonly>
        <div class="buttons">
            <button class="clear" onclick="calc.clear()">清除</button>
            <button class="operator" onclick="calc.append('/')">/</button>
            <button class="operator" onclick="calc.append('*')">×</button>
            
            <button class="number" onclick="calc.append('7')">7</button>
            <button class="number" onclick="calc.append('8')">8</button>
            <button class="number" onclick="calc.append('9')">9</button>
            <button class="operator" onclick="calc.append('-')">−</button>
            
            <button class="number" onclick="calc.append('4')">4</button>
            <button class="number" onclick="calc.append('5')">5</button>
            <button class="number" onclick="calc.append('6')">6</button>
            <button class="operator" onclick="calc.append('+')">+</button>
            
            <button class="number" onclick="calc.append('1')">1</button>
            <button class="number" onclick="calc.append('2')">2</button>
            <button class="number" onclick="calc.append('3')">3</button>
            <button class="operator" onclick="calc.append('.')">.​</button>
            
            <button class="number" style="grid-column: span 2;" onclick="calc.append('0')">0</button>
            <button class="equal" onclick="calc.calculate()">=</button>
        </div>
    </div>
    <div class="version">版本v1.2</div>
    </div>


    <script>
        const calc = {
            display: document.getElementById('display'),
            append(val) {
                if(val === '.' && this.display.value.includes('.')) return;
                this.display.value += val;
            },
            clear() {
                this.display.value = '';
            },
            calculate() {
                try {
                    this.display.value = Function('"use strict"; return (' + this.display.value + ')')();
                } catch {
                    this.display.value = '錯誤';
                }
            }
        };
    </script>
</body>
</html>
